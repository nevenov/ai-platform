<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>
<body class="bg-white dark:bg-zinc-900 text-black dark:text-white min-h-screen">
  <div class="p-8">
    <h1 class="text-4xl font-bold">Dark Mode Test</h1>
    <div class="mt-4 p-4 bg-zinc-100 dark:bg-zinc-800 rounded">
      <p>If this background is dark gray, dark mode works!</p>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded">
      Toggle Dark Mode
    </button>
  </div>
</body>
</html>
